services:
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: integration_governance
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - db